---
name: Main Workflow

on:
  push:
    branches:
      - "main"
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:
    inputs:
      blog:
        description: "Build & Push Manually"
        required: true
        default: "yes"

jobs:
  detect-directory-changes:
    name: "Detect Changes"
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect Directory Changes
        id: detect
        uses: tchupp/actions-detect-directory-changes@v1
        with:
          included-extensions: "!*.yml,Dockerfile"

  docker-build:
    name: Docker Build
    runs-on: namespace-profile-docker-images
    needs: detect-directory-changes
    if: needs.detect-directory-changes.outputs.changed != '[]'
    strategy:
      fail-fast: false
      matrix:
        docker-dir: ${{ fromJSON(needs.detect-directory-changes.outputs.changed) }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Qemu
        uses: docker/setup-qemu-action@v4
        with:
          image: tonistiigi/binfmt:latest
          platforms: amd64,arm64

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Registry
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.docker-dir }}
          file: ${{ matrix.docker-dir }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.docker-dir }}:latest

  custom-builds:
    name: Custom Docker Build
    runs-on: namespace-profile-docker-images
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Qemu
        uses: docker/setup-qemu-action@v4
        with:
          image: tonistiigi/binfmt:latest
          platforms: amd64,arm64

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Registry
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run Script to Build and Push
        run: |
          .github/custom-builds.sh
